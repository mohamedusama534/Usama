<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBridge | Connecting Businesses & Helpers</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-50 font-['Inter'] text-zinc-900">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-zinc-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v4h3v7h4v-7h3v-4L12 3z"/></svg>
                </div>
                <span class="text-xl font-bold tracking-tight">WorkBridge</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showPage('login')" class="text-sm font-bold text-zinc-600 hover:text-indigo-600 transition-colors">Login</button>
                <button onclick="showPage('register')" class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">Sign Up</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main id="app-content" class="max-w-7xl mx-auto px-4 py-12">
        <!-- Pages will be injected here -->
    </main>

    <!-- Templates -->
    <template id="home-page">
        <div class="space-y-20 py-12">
            <!-- Hero Section -->
            <div class="text-center space-y-8 py-12">
                <h1 class="text-6xl font-black tracking-tight text-zinc-900">
                    Connecting <span class="text-indigo-600">Businesses</span><br>with Local <span class="text-emerald-600">Helpers</span>
                </h1>
                <p class="text-xl text-zinc-500 max-w-2xl mx-auto font-medium">
                    The bridge between opportunity and talent. Find jobs, hire helpers, and grow your community.
                </p>
                <div class="flex items-center justify-center gap-4">
                    <button onclick="showPage('register')" class="px-8 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200">Get Started</button>
                    <button class="px-8 py-4 bg-white text-zinc-900 border border-zinc-200 rounded-2xl font-bold hover:bg-zinc-50 transition-all">Learn More</button>
                </div>
            </div>

            <!-- Featured Sections -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- For Businesses -->
                <div class="bg-white p-8 rounded-3xl border border-zinc-200 shadow-sm space-y-6">
                    <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    </div>
                    <h3 class="text-2xl font-bold">For Businesses</h3>
                    <p class="text-zinc-500 font-medium">Post jobs, browse helper profiles, and find the perfect match for your business needs.</p>
                    <ul class="space-y-3">
                        <li class="flex items-center gap-2 text-sm text-zinc-600 font-medium">
                            <svg class="text-emerald-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            Verified helper profiles
                        </li>
                        <li class="flex items-center gap-2 text-sm text-zinc-600 font-medium">
                            <svg class="text-emerald-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            Easy job posting
                        </li>
                    </ul>
                </div>

                <!-- For Helpers -->
                <div class="bg-white p-8 rounded-3xl border border-zinc-200 shadow-sm space-y-6">
                    <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
                    </div>
                    <h3 class="text-2xl font-bold">For Helpers</h3>
                    <p class="text-zinc-500 font-medium">Create your profile, showcase your experience, and find flexible work that fits your schedule.</p>
                    <ul class="space-y-3">
                        <li class="flex items-center gap-2 text-sm text-zinc-600 font-medium">
                            <svg class="text-emerald-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            Flexible timings
                        </li>
                        <li class="flex items-center gap-2 text-sm text-zinc-600 font-medium">
                            <svg class="text-emerald-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            Direct business contact
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </template>

    <template id="login-page">
        <div class="max-w-md mx-auto space-y-8">
            <div class="text-center space-y-2">
                <h1 class="text-3xl font-bold">Welcome Back</h1>
                <p class="text-zinc-500">Enter your credentials to access your account</p>
            </div>
            <form onsubmit="handleLogin(event)" class="bg-white p-8 rounded-3xl border border-zinc-200 shadow-xl space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-zinc-700">Email</label>
                    <input type="email" id="login-email" required class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="name@example.com">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-zinc-700">Password</label>
                    <input type="password" id="login-password" required class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all">Login</button>
                <p class="text-center text-sm text-zinc-500 font-medium">
                    Don't have an account? <button type="button" onclick="showPage('register')" class="text-indigo-600 hover:underline">Sign Up</button>
                </p>
            </form>
        </div>
    </template>

    <template id="register-page">
        <div class="max-w-2xl mx-auto space-y-8">
            <div class="text-center space-y-2">
                <h1 class="text-3xl font-bold">Create Account</h1>
                <p class="text-zinc-500">Join the WorkBridge community today</p>
            </div>
            <form onsubmit="handleRegister(event)" class="bg-white p-8 rounded-3xl border border-zinc-200 shadow-xl space-y-8">
                <!-- Role Selection -->
                <div class="space-y-4">
                    <label class="text-sm font-bold text-zinc-700">I am a...</label>
                    <div class="grid grid-cols-3 gap-4">
                        <button type="button" onclick="setRole('normal')" id="role-normal" class="role-btn p-4 rounded-2xl border-2 border-indigo-600 bg-indigo-50/50 text-left transition-all">
                            <span class="block font-bold text-sm">Normal</span>
                            <span class="text-[10px] text-zinc-500 leading-tight">Browse only</span>
                        </button>
                        <button type="button" onclick="setRole('helper')" id="role-helper" class="role-btn p-4 rounded-2xl border-2 border-zinc-100 bg-zinc-50 text-left transition-all">
                            <span class="block font-bold text-sm">Helper</span>
                            <span class="text-[10px] text-zinc-500 leading-tight">Find jobs</span>
                        </button>
                        <button type="button" onclick="setRole('business')" id="role-business" class="role-btn p-4 rounded-2xl border-2 border-zinc-100 bg-zinc-50 text-left transition-all">
                            <span class="block font-bold text-sm">Business</span>
                            <span class="text-[10px] text-zinc-500 leading-tight">Hire talent</span>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-zinc-700">Full Name</label>
                        <input type="text" id="reg-name" required class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="John Doe">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-zinc-700">Email</label>
                        <input type="email" id="reg-email" required class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="name@example.com">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-zinc-700">Phone</label>
                        <input type="tel" id="reg-phone" required class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="+91 98765 43210">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-zinc-700">Location</label>
                        <input type="text" id="reg-location" required class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="Chennai, TN">
                    </div>
                    <div class="space-y-2 md:col-span-2">
                        <label class="text-sm font-bold text-zinc-700">Password</label>
                        <input type="password" id="reg-password" required class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="••••••••">
                    </div>

                    <!-- Business Fields -->
                    <div id="business-fields" class="hidden md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-zinc-700">Kind of Business</label>
                            <input type="text" id="reg-category" class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. Restaurant">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-zinc-700">How many years doing</label>
                            <input type="number" id="reg-years-biz" class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. 5">
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="text-sm font-bold text-zinc-700">Describe the business</label>
                            <textarea id="reg-desc" class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all min-h-[100px]" placeholder="Tell us about your business..."></textarea>
                        </div>
                    </div>

                    <!-- Helper Fields -->
                    <div id="helper-fields" class="hidden md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-zinc-700">Last place of work</label>
                            <input type="text" id="reg-last-work" class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="Where did you work last?">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-zinc-700">Years of experience</label>
                            <input type="number" id="reg-exp" class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. 3">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-zinc-700">Preferred type of work</label>
                            <input type="text" id="reg-pref-work" class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. Cleaning">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-zinc-700">Availability / Timing</label>
                            <input type="text" id="reg-avail" class="w-full px-4 py-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. Weekends">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all">Sign Up</button>
                <p class="text-center text-sm text-zinc-500 font-medium">
                    Already have an account? <button type="button" onclick="showPage('login')" class="text-indigo-600 hover:underline">Login</button>
                </p>
            </form>
        </div>
    </template>

    <template id="dashboard-page">
        <div class="max-w-4xl mx-auto space-y-8">
            <div class="flex items-center justify-between">
                <h1 class="text-3xl font-bold">Your Dashboard</h1>
                <button onclick="showPage('home')" class="text-sm font-bold text-zinc-500 hover:text-indigo-600">Logout</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Profile Card -->
                <div class="md:col-span-1 bg-white p-6 rounded-3xl border border-zinc-200 shadow-sm space-y-6">
                    <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="text-center space-y-1">
                        <h2 id="dash-name" class="text-xl font-bold">User Name</h2>
                        <p id="dash-role" class="text-sm text-zinc-500 uppercase tracking-wider font-bold">Role</p>
                    </div>
                    <div class="space-y-4 pt-4 border-t border-zinc-100">
                        <div class="flex items-center gap-3 text-sm">
                            <svg class="text-zinc-400" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <span id="dash-phone">Phone</span>
                        </div>
                        <div class="flex items-center gap-3 text-sm">
                            <svg class="text-zinc-400" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            <span id="dash-location">Location</span>
                        </div>
                    </div>
                </div>

                <!-- Details Card -->
                <div class="md:col-span-2 bg-white p-8 rounded-3xl border border-zinc-200 shadow-sm space-y-6">
                    <h3 class="text-xl font-bold">Account Details</h3>
                    <div id="dash-details" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Dynamic details will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
